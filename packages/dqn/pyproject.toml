[project]
name = "dqn"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "durak",
    "ray[default,rllib,tune]>=2.55.1",
    "dm-tree>=0.1.10",
    "lz4>=4.4.5",
    "msgpack>=1.1.2",
    "scipy>=1.15.3",
    "tensorboard>=2.20.0",
    "matplotlib>=3.10.9",
    "gputil>=1.4.0",
    "opencv-python>=4.13.0.92",
    "tqdm>=4.67.3",
    "torch>=2.12.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dqn"]
