[project]
name = "durak"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "numpy>=2.2.6",
    "gymnasium>=1.2.2",
    "pettingzoo>=1.26.1",
    "prettytable>=3.17.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/durak"]